<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HFC Intelligence — Competitor Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0A0C12;
  --ink2:#0F1220;
  --ink3:#161B2E;
  --ink4:#1D2540;
  --ink5:#263060;
  --gold:#C9A84C;
  --gold2:#E8C56A;
  --gold-dim:rgba(201,168,76,0.12);
  --cream:#F5EDD8;
  --white:#FFFFFF;
  --slate:#8494B8;
  --slate2:#A0AEC8;
  --edge:rgba(255,255,255,0.06);
  --edge2:rgba(255,255,255,0.1);
  --green:#2DD4A0;
  --red:#F06070;
  --amber:#F5A623;
  --blue:#5B9CF6;
  --r:10px;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'IBM Plex Sans',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--ink);color:var(--cream);min-height:100vh;overflow-x:hidden}

/* grid texture */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;z-index:0;
}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--ink5);border-radius:3px}

/* layout */
.shell{display:flex;min-height:100vh;position:relative;z-index:1}

/* sidebar */
.sidebar{
  width:220px;flex-shrink:0;
  background:var(--ink2);
  border-right:1px solid var(--edge);
  display:flex;flex-direction:column;
  position:fixed;left:0;top:0;bottom:0;
}
.sidebar-logo{
  padding:22px 18px 18px;
  border-bottom:1px solid var(--edge);
}
.logo-text{
  font-family:var(--font-display);
  font-size:20px;font-weight:700;
  color:var(--gold);letter-spacing:0.02em;
  line-height:1;
}
.logo-tag{
  font-size:9px;color:var(--slate);
  text-transform:uppercase;letter-spacing:2px;
  margin-top:5px;font-weight:400;
}
.sidebar-nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav-sep{
  font-size:8.5px;color:var(--ink5);
  text-transform:uppercase;letter-spacing:2px;
  padding:14px 8px 5px;font-weight:600;
}
.nav-btn{
  display:flex;align-items:center;gap:9px;
  width:100%;padding:8px 10px;border-radius:7px;
  background:none;border:none;cursor:pointer;
  color:var(--slate);font-family:var(--font-body);
  font-size:13px;font-weight:400;
  transition:all 0.15s;text-align:left;
  margin-bottom:1px;
}
.nav-btn:hover{background:var(--edge);color:var(--cream)}
.nav-btn.active{background:var(--gold-dim);color:var(--gold);font-weight:500}
.nav-btn-icon{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.nav-count{
  margin-left:auto;font-size:9px;
  background:rgba(201,168,76,0.2);color:var(--gold);
  padding:1px 6px;border-radius:10px;font-weight:600;
}
.sidebar-foot{
  padding:14px 18px;border-top:1px solid var(--edge);
  font-size:10px;color:var(--ink5);line-height:1.6;
}
.sidebar-foot span{color:var(--gold);font-weight:500}

/* topbar */
.topbar{
  position:sticky;top:0;z-index:50;
  height:56px;
  background:rgba(10,12,18,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--edge);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
}
.topbar-left h1{
  font-family:var(--font-display);
  font-size:17px;font-weight:600;color:var(--cream);letter-spacing:0.02em;
}
.topbar-left p{font-size:10.5px;color:var(--slate);margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center}

/* main */
.main{margin-left:220px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.page{padding:24px;max-width:1380px;width:100%}

/* buttons */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 15px;border-radius:7px;border:none;cursor:pointer;
  font-family:var(--font-body);font-size:12.5px;font-weight:500;
  transition:all 0.15s;white-space:nowrap;
}
.btn-gold{background:var(--gold);color:var(--ink);font-weight:600}
.btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--edge2);color:var(--slate)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-ghost{background:transparent;color:var(--slate)}
.btn-ghost:hover{color:var(--cream)}
.btn-danger{background:rgba(240,96,112,0.12);color:var(--red);border:1px solid rgba(240,96,112,0.2)}
.btn-sm{padding:5px 11px;font-size:11.5px;border-radius:6px}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important}

/* cards */
.card{
  background:var(--ink2);
  border:1px solid var(--edge);
  border-radius:var(--r);overflow:hidden;
}
.card-hd{
  padding:15px 20px;border-bottom:1px solid var(--edge);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:13px;font-weight:600;color:var(--cream)}
.card-bd{padding:20px}

/* stat cards */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{
  background:var(--ink2);border:1px solid var(--edge);
  border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden;
}
.stat::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--gold);opacity:0;transition:opacity 0.3s;
}
.stat:hover::after{opacity:1}
.stat-lbl{font-size:10px;color:var(--slate);text-transform:uppercase;letter-spacing:1px;font-weight:500}
.stat-val{
  font-family:var(--font-display);
  font-size:30px;font-weight:700;color:var(--cream);
  margin:5px 0 3px;line-height:1;
}
.stat-sub{font-size:10.5px;color:var(--slate)}

/* upload zone */
.dropzone{
  border:1.5px dashed var(--ink5);border-radius:var(--r);
  background:rgba(201,168,76,0.02);
  padding:44px 28px;text-align:center;cursor:pointer;
  transition:all 0.2s;position:relative;
}
.dropzone:hover,.dropzone.drag{
  border-color:var(--gold);background:rgba(201,168,76,0.05);
}
.dropzone input{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.dz-icon{font-size:36px;margin-bottom:10px;opacity:0.7}
.dz-title{font-size:15px;font-weight:600;color:var(--cream);margin-bottom:5px}
.dz-sub{font-size:12px;color:var(--slate);line-height:1.6}

/* form */
.fg{margin-bottom:15px}
.flabel{
  display:block;font-size:10.5px;color:var(--slate);
  text-transform:uppercase;letter-spacing:1px;
  font-weight:500;margin-bottom:6px;
}
.finput{
  width:100%;background:var(--ink3);
  border:1px solid var(--edge);border-radius:7px;
  padding:9px 12px;color:var(--cream);
  font-family:var(--font-body);font-size:13px;
  outline:none;transition:border-color 0.15s;
}
.finput:focus{border-color:var(--gold)}
.finput option{background:var(--ink3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* progress */
.prog-wrap{margin:10px 0}
.prog-bar{height:3px;background:var(--ink4);border-radius:2px;overflow:hidden}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));
  background-size:200%;
  border-radius:2px;transition:width 0.4s ease;
  animation:shim 1.8s ease infinite;
}
@keyframes shim{0%{background-position:0%}100%{background-position:200%}}

/* table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{
  background:var(--ink3);
  font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--slate);padding:10px 14px;
  text-align:left;border-bottom:1px solid var(--edge);
  white-space:nowrap;
}
.tbl td{
  padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:13px;vertical-align:middle;
}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(201,168,76,0.03)}
.tbl-num{
  font-family:var(--font-mono);font-size:13.5px;
  color:var(--gold);font-weight:500;
}
.tbl-unit{font-size:10px;color:var(--slate);margin-left:3px}
.tbl-src{
  font-size:10px;color:var(--slate);
  font-style:italic;max-width:260px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* badges */
.badge{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:20px;
  font-size:10px;font-weight:600;
}
.badge-green{background:rgba(45,212,160,0.12);color:var(--green)}
.badge-amber{background:rgba(245,166,35,0.12);color:var(--amber)}
.badge-red{background:rgba(240,96,112,0.12);color:var(--red)}
.badge-slate{background:rgba(132,148,184,0.1);color:var(--slate)}
.badge-gold{background:var(--gold-dim);color:var(--gold)}
.badge-blue{background:rgba(91,156,246,0.12);color:var(--blue)}

/* field picker */
.field-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.field-chip{
  display:flex;align-items:center;gap:7px;
  padding:8px 10px;border-radius:6px;cursor:pointer;
  border:1px solid var(--edge);transition:all 0.12s;
  font-size:12px;color:var(--slate);user-select:none;
}
.field-chip:hover{border-color:rgba(201,168,76,0.4);color:var(--cream)}
.field-chip.on{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.fchk{
  width:14px;height:14px;border-radius:3px;
  border:1px solid var(--ink5);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:9px;
}
.field-chip.on .fchk{background:var(--gold);border-color:var(--gold);color:var(--ink)}

/* compare */
.cmp-hdr,.cmp-row{
  display:grid;align-items:center;
  padding:9px 16px;
}
.cmp-hdr{
  background:var(--ink3);font-size:10px;font-weight:600;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--slate);border-bottom:1px solid var(--edge);
  position:sticky;top:0;
}
.cmp-row{border-bottom:1px solid rgba(255,255,255,0.04)}
.cmp-row:last-child{border-bottom:none}
.cmp-row:hover{background:rgba(201,168,76,0.03)}
.cmp-metric{font-size:13px;font-weight:500;color:var(--cream)}
.cmp-cat{font-size:9.5px;color:var(--slate);margin-top:1px}
.cmp-val{
  font-family:var(--font-mono);font-size:13px;
  text-align:right;padding-right:4px;
}
.cmp-best{color:var(--green);font-weight:600}
.cmp-worst{color:var(--red)}
.cmp-null{color:var(--ink5)}

/* tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--edge);margin-bottom:20px}
.tab{
  padding:9px 16px;font-size:12.5px;font-weight:500;
  color:var(--slate);cursor:pointer;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all 0.15s;
}
.tab:hover{color:var(--cream)}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* alert */
.alert{
  padding:11px 14px;border-radius:7px;
  font-size:12.5px;display:flex;align-items:flex-start;gap:9px;margin-bottom:14px;
}
.alert-info{background:rgba(91,156,246,0.1);border:1px solid rgba(91,156,246,0.2);color:#93BBFD}
.alert-ok{background:rgba(45,212,160,0.1);border:1px solid rgba(45,212,160,0.2);color:#6EE7B7}
.alert-err{background:rgba(240,96,112,0.1);border:1px solid rgba(240,96,112,0.2);color:#FCA5A5}

/* file pill */
.fpill{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:7px;
  background:var(--ink3);border:1px solid var(--edge);margin-bottom:6px;
}
.fpill-icon{font-size:22px;flex-shrink:0}
.fpill-name{font-size:12.5px;font-weight:500;color:var(--cream)}
.fpill-meta{font-size:10.5px;color:var(--slate);margin-top:1px}

/* spinner */
.spin{
  display:inline-block;width:16px;height:16px;
  border:2px solid var(--ink4);border-top-color:var(--gold);
  border-radius:50%;animation:rot 0.7s linear infinite;
}
@keyframes rot{to{transform:rotate(360deg)}}

/* onboarding overlay */
.overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(7,9,15,0.96);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
}
.onboard-box{
  background:var(--ink2);border:1px solid var(--edge2);
  border-radius:14px;padding:36px 32px;width:460px;
  position:relative;
}
.onboard-logo{
  font-family:var(--font-display);
  font-size:28px;font-weight:700;color:var(--gold);
  margin-bottom:6px;
}
.onboard-sub{font-size:13px;color:var(--slate);line-height:1.6;margin-bottom:22px}

/* steps guide */
.steps-card{
  background:var(--ink3);border-radius:8px;
  padding:16px;margin-top:14px;
}
.step-row{
  display:flex;gap:12px;margin-bottom:12px;
  align-items:flex-start;
}
.step-row:last-child{margin-bottom:0}
.step-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--gold);color:var(--ink);
  font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.step-text{font-size:12px;color:var(--slate);line-height:1.6}
.step-text strong{color:var(--cream)}
code{
  font-family:var(--font-mono);font-size:11px;
  background:var(--ink4);color:var(--gold2);
  padding:1px 5px;border-radius:3px;
}

/* glow line */
.glow-line{
  height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:20px 0;opacity:0.3;
}

/* empty state */
.empty{text-align:center;padding:56px 20px}
.empty-ico{font-size:44px;margin-bottom:12px;opacity:0.35}
.empty-h{font-family:var(--font-display);font-size:20px;color:var(--cream);margin-bottom:6px}
.empty-p{font-size:12.5px;color:var(--slate);margin-bottom:18px}

/* tooltip on hover for source */
[data-tip]{position:relative;cursor:help}
[data-tip]:hover::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 6px);left:0;
  background:var(--ink4);border:1px solid var(--edge2);
  color:var(--cream);font-size:11px;padding:6px 10px;
  border-radius:6px;white-space:normal;max-width:280px;
  width:max-content;z-index:99;line-height:1.5;
}

/* responsive */
@media(max-width:900px){
  .sidebar{display:none}
  .main{margin-left:0}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .field-grid{grid-template-columns:repeat(2,1fr)}
}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp 0.3s ease both}
.fade-up-1{animation-delay:0.05s}
.fade-up-2{animation-delay:0.1s}
.fade-up-3{animation-delay:0.15s}
.fade-up-4{animation-delay:0.2s}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

/* ─────────────────────────────────────────────
   CONFIG — Update these two lines after deploy
   ───────────────────────────────────────────── */
const SUPABASE_URL      = "";  // e.g. "https://abcdef.supabase.co" (leave blank to skip Supabase)
const SUPABASE_ANON_KEY = "";  // leave blank to skip Supabase; data stays in-memory per session

/* ─────────────────────────────────────────────
   20 HFC KPIs + categories

/* ─────────────────────────────────────────────
   Utility helpers
   ───────────────────────────────────────────── */
function toBase64(file){
  return new Promise((ok,fail)=>{
    const r=new FileReader();
    r.onload=()=>ok(r.result.split(",")[1]);
    r.onerror=fail;
    r.readAsDataURL(file);
  });
}
function fmt(n){ return n===null||n===undefined?"—":n; }
function confClass(c){
  if(c==="high")      return "badge-green";
  if(c==="medium")    return "badge-amber";
  if(c==="low")       return "badge-red";
  return "badge-slate";
}
function confLabel(c){
  if(c==="high")      return "High";
  if(c==="medium")    return "Medium";
  if(c==="low")       return "Low";
  return "Not found";
}

/* ─────────────────────────────────────────────
   Build extraction prompt
   ───────────────────────────────────────────── */
function buildPrompt(fields, docType, period, customFields){
  const allFields = [...fields, ...(customFields||[])];
  return `You are a senior financial analyst specialising in Indian Housing Finance Companies (HFCs).

You are analysing a ${docType||"financial document"} ${period ? `for the period ${period}` : "(auto-detect the period)"}.

Extract the following fields. Return ONLY a JSON object — no preamble, no markdown fences.

Fields to extract:
${JSON.stringify(allFields, null, 2)}

Output format (strict):
{
  "company_name": "full company name as stated in document",
  "period_detected": "e.g. Q3 FY25",
  "notes": "brief observation about document quality / any caveats",
  "fields": {
    "<key>": {
      "value": <number | string | null>,
      "unit": "<unit from field definition>",
      "conf": "high | medium | low | not_found",
      "src": "<verbatim excerpt from document where this value was found, or null>"
    }
  }
}

Rules:
- Return numbers as plain numbers (e.g. 3.5 not "3.5%", 12500 not "₹12,500 Cr")
- If a value is not found, set value to null and conf to "not_found"
- Look in: slide titles, financial highlights, KPI tables, management commentary
- For scanned/image pages, carefully read all visible text and numbers
- conf = "high" when value is directly stated; "medium" when derived/approximate; "low" when inferred
- Do NOT include any text outside the JSON object`;
}

/* ─────────────────────────────────────────────
   Call Claude API (direct from browser)
   ───────────────────────────────────────────── */
async function callClaude(apiKey, pdfBase64, fields, docType, period, customFields){
  const prompt = buildPrompt(fields, docType, period, customFields);
  const resp = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body: JSON.stringify({
      model:"claude-opus-4-5",
      max_tokens:4096,
      messages:[{
        role:"user",
        content:[
          {type:"document",source:{type:"base64",media_type:"application/pdf",data:pdfBase64}},
          {type:"text",text:prompt},
        ],
      }],
    }),
  });
  if(!resp.ok){
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.error?.message || `Claude API error ${resp.status}`);
  }
  const data = await resp.json();
  const raw = data.content[0].text;
  const clean = raw.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
  return {parsed: JSON.parse(clean), tokens: (data.usage?.input_tokens||0)+(data.usage?.output_tokens||0)};
}

/* ─── Upload & Extract ────────────────────── */
function Upload({extractions,addExtraction,apiKey,customFields}){
  const [files,setFiles]     = useState([]);
  const [drag,setDrag]       = useState(false);
  const [form,setForm]       = useState({company:"",docType:"investor_presentation",period:""});
  const [selFields,setSelF]  = useState(HFC_FIELDS.map(f=>f.key));
  const [phase,setPhase]     = useState("idle"); // idle|processing|done|error
  const [progress,setProg]   = useState(0);
  const [progMsg,setProgMsg] = useState("");
  const [result,setResult]   = useState(null);
  const [err,setErr]         = useState("");
  const fileRef              = useRef();

  function addFiles(fs){
    const pdfs=Array.from(fs).filter(f=>f.type==="application/pdf"||f.name.endsWith(".pdf"));
    if(!pdfs.length){setErr("Only PDF files are supported.");return;}
    setFiles(p=>[...p,...pdfs]);setErr("");
  }

  function toggleField(k){ setSelF(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]); }

  async function run(){
    if(!files.length)     { setErr("Please upload at least one PDF."); return; }
    if(!form.company.trim()){ setErr("Please enter the competitor company name."); return; }
    setErr(""); setPhase("processing"); setProg(5);

    try{
      const file = files[0];
      const activeFields = HFC_FIELDS.filter(f=>selFields.includes(f.key))
        .concat(customFields||[]);

      if(!apiKey){
        // Demo mode
        setProgMsg("Demo mode — loading sample data…");
        setProg(30);
        await new Promise(r=>setTimeout(r,800));
        setProg(70);
        setProgMsg("Structuring results…");
        await new Promise(r=>setTimeout(r,600));
        setProg(100);
        const demoResult = {
          ...DEMO_DATA,
          company_name: form.company,
          period_detected: form.period || DEMO_DATA.period_detected,
        };
        const ext={
          id:Date.now(),company:form.company,
          docType:form.docType,period:form.period||demoResult.period_detected,
          fileName:file.name,fileSize:file.size,
          data:demoResult,selFields,tokens:0,isDemo:true,
          processedAt:new Date().toISOString(),
        };
        setResult(ext);addExtraction(ext);setPhase("done");
        return;
      }

      // Real API call
      setProgMsg("Converting PDF to base64…");
      const b64 = await toBase64(file);
      setProg(20);

      setProgMsg("Sending to Claude claude-opus-4-5 — reading document…");
      setProg(35);

      // Simulate progress ticks while waiting
      const ticker = setInterval(()=>{
        setProg(p=>p<88?p+Math.random()*4:p);
        setProgMsg(p=>{
          if(p<50) return "Claude is reading the PDF pages…";
          if(p<70) return "Identifying financial tables and KPIs…";
          if(p<85) return "Extracting metrics with confidence ratings…";
          return "Structuring final output…";
        });
      },900);

      let parsed,tokens;
      try{
        const res = await callClaude(apiKey,b64,activeFields,form.docType,form.period,customFields);
        parsed=res.parsed; tokens=res.tokens;
      } finally { clearInterval(ticker); }

      setProg(100);
      const ext={
        id:Date.now(),company:parsed.company_name||form.company,
        docType:form.docType,period:parsed.period_detected||form.period,
        fileName:file.name,fileSize:file.size,
        data:parsed,selFields,tokens,isDemo:false,
        processedAt:new Date().toISOString(),
      };
      setResult(ext);addExtraction(ext);setPhase("done");

    } catch(e){
      setErr(e.message||"Extraction failed. Check your API key and try again.");
      setPhase("error");
    }
  }

  if(phase==="processing") return (
    <div style={{maxWidth:520,margin:"60px auto"}}>
      <div className="card">
        <div className="card-bd" style={{textAlign:"center",padding:"44px 32px"}}>
          <div style={{fontSize:44,marginBottom:16}}>🤖</div>
          <h3 style={{fontFamily:"var(--font-display)",fontSize:22,color:"var(--cream)",marginBottom:8,fontWeight:600}}>
            Claude is reading your document
          </h3>
          <p style={{fontSize:12.5,color:"var(--slate)",marginBottom:22,lineHeight:1.6}}>
            {files[0]?.name}<br/>
            {progMsg}
          </p>
          <div className="prog-wrap">
            <div className="prog-bar">
              <div className="prog-fill" style={{width:`${progress}%`}}/>
            </div>
          </div>
          <p style={{marginTop:8,fontSize:11,color:"var(--slate)"}}>{Math.round(progress)}%</p>
          <p style={{marginTop:20,fontSize:11.5,color:"var(--ink5)",lineHeight:1.7}}>
            Scanned PDFs? No problem — Claude uses vision AI to read image-based pages.<br/>
            Claude Opus handles documents up to 200+ pages with 200K token context.
          </p>
        </div>
      </div>
    </div>
  );

  if(phase==="done"&&result) return (
    <div style={{maxWidth:900,margin:"0 auto"}}>
      <div className="alert alert-ok">
        ✓ Extraction complete.{" "}
        {Object.values(result.data?.fields||{}).filter(f=>f.value!==null).length} of{" "}
        {result.selFields?.length} fields extracted.
        {result.isDemo&&" (Demo mode — using sample data. Add Claude API key for real extraction.)"}
      </div>

/* ─── Extraction result card ──────────────── */
function ExtractResult({ext}){
  const {data,selFields}=ext;
  if(!data?.fields) return <div className="alert alert-err">No data extracted.</div>;

  const display = HFC_FIELDS.filter(f=>(selFields||HFC_FIELDS.map(x=>x.key)).includes(f.key));
  const found   = display.filter(f=>data.fields[f.key]?.value!==null).length;

  return (
    <div className="card">
      <div className="card-hd">
        <div>
          <div className="card-title" style={{fontFamily:"var(--font-display)",fontSize:16}}>
            {data.company_name||ext.company}
          </div>
          <div style={{fontSize:11,color:"var(--slate)",marginTop:3}}>
            {data.period_detected||ext.period}
            &nbsp;·&nbsp;{ext.docType?.replace(/_/g," ")}
            &nbsp;·&nbsp;{ext.fileName}
            &nbsp;·&nbsp;<span style={{color:"var(--green)"}}>{found}/{display.length} fields found</span>
          </div>
        </div>
      </div>
      {data.notes&&(
        <div style={{padding:"9px 20px",background:"rgba(91,156,246,0.06)",
          borderBottom:"1px solid var(--edge)",fontSize:12,color:"#93BBFD",lineHeight:1.5}}>
          ℹ {data.notes}
        </div>
      )}
      <div style={{overflowX:"auto"}}>
        <table className="tbl">
          <thead>
            <tr>
              <th>Metric</th>
              <th>Category</th>
              <th>Value</th>
              <th>Confidence</th>
              <th>Source (from document)</th>
            </tr>
          </thead>
          <tbody>
            {display.map(f=>{
              const fd=data.fields?.[f.key];
              const conf=fd?.conf||"not_found";
              return (
                <tr key={f.key}>
                  <td style={{fontWeight:500,color:"var(--cream)"}}>{f.label}</td>
                  <td><span className="badge badge-slate" style={{fontSize:9.5}}>{f.cat}</span></td>
                  <td>
                    {fd?.value!=null
                      ?<><span className="tbl-num">{fd.value}</span><span className="tbl-unit">{f.unit}</span></>
                      :<span style={{color:"var(--ink5)"}}>—</span>}
                  </td>
                  <td><span className={`badge ${confClass(conf)}`}>{confLabel(conf)}</span></td>
                  <td>
                    {fd?.src
                      ? <span className="tbl-src" data-tip={fd.src} title={fd.src}>{fd.src}</span>
                      : <span style={{color:"var(--ink5)",fontSize:11}}>Not mentioned in document</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ─── Compare ─────────────────────────────── */
function Compare({extractions}){
  const [catFilter,setCat]=useState("all");
  const cats=["all",...new Set(HFC_FIELDS.map(f=>f.cat))];

  // Use demo data if less than 2 real extractions
  const data = extractions.length>=2 ? extractions : [
    {company:"Aavas Financiers",period:"Q3 FY25",data:DEMO_DATA},
    {company:"Can Fin Homes",   period:"Q3 FY25",data:DEMO_DATA_2},
  ];

  const isDemo = extractions.length<2;

  const fields = catFilter==="all"
    ? HFC_FIELDS.filter(f=>f.key!=="period")
    : HFC_FIELDS.filter(f=>f.cat===catFilter&&f.key!=="period");

  const cols = data.length;
  const gridCols = `200px repeat(${cols},1fr)`;

  return (
    <div>
      {isDemo&&(
        <div className="alert alert-info" style={{marginBottom:14}}>
          ℹ Showing demo comparison. Upload 2+ documents to compare your real extractions.
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {cats.map(c=>(
          <button key={c} className={`btn btn-sm ${catFilter===c?"btn-gold":"btn-outline"}`}
            onClick={()=>setCat(c)}>
            {c==="all"?"All KPIs":c}
          </button>
        ))}
      </div>

      <div className="card">
        <div className="card-hd">
          <div className="card-title">
            {catFilter==="all"?"All KPIs":catFilter} — {cols} Companies
          </div>
          <div style={{fontSize:11,color:"var(--slate)",display:"flex",gap:12"}}>
            <span style={{color:"var(--green)"}}>▲ Best</span>
            <span style={{color:"var(--red)"}}>▼ Worst</span>
          </div>
        </div>
        <div style={{overflowX:"auto"}}>
          {/* header */}
          <div style={{display:"grid",gridTemplateColumns:gridCols,
            background:"var(--ink3)",borderBottom:"1px solid var(--edge)",padding:"10px 16px"}}>
            <div style={{fontSize:10,color:"var(--slate)",textTransform:"uppercase",letterSpacing:"1px",fontWeight:600}}>Metric</div>
            {data.map((d,i)=>(
              <div key={i} style={{textAlign:"right",paddingRight:6}}>
                <div style={{fontSize:12,fontWeight:600,color:"var(--cream)"}}>{d.company||d.data?.company_name}</div>
                <div style={{fontSize:10,color:"var(--slate)"}}>{d.period||d.data?.period_detected}</div>
              </div>
            ))}
          </div>

          {/* rows */}
          {fields.map(f=>{
            const vals=data.map(d=>{
              const fd=d.data?.fields?.[f.key];
              return typeof fd?.value==="number"?fd.value:null;
            });
            const nums=vals.filter(v=>v!==null);
            const mx=nums.length?Math.max(...nums):null;
            const mn=nums.length?Math.min(...nums):null;
            const lowerBetter=["gnpa","nnpa","cost_income","cof"].includes(f.key);
            const best=lowerBetter?mn:mx;
            const worst=lowerBetter?mx:mn;

            return (
              <div key={f.key} className="cmp-row" style={{gridTemplateColumns:gridCols}}>
                <div>
                  <div className="cmp-metric">{f.label}</div>
                  <div className="cmp-cat">{f.unit?`(${f.unit}) · `:""}{f.cat}</div>
                </div>
                {vals.map((v,i)=>{
                  const isBest =v!==null&&v===best &&nums.length>1;
                  const isWorst=v!==null&&v===worst&&nums.length>1;
                  return (
                    <div key={i} className={`cmp-val ${isBest?"cmp-best":isWorst?"cmp-worst":""} ${v===null?"cmp-null":""}`}>
                      {v!==null?<>
                        {isBest&&<span style={{fontSize:10,marginRight:3}}>▲</span>}
                        {isWorst&&<span style={{fontSize:10,marginRight:3}}>▼</span>}
                        {v}{f.unit&&<span className="tbl-unit">{f.unit}</span>}
                      </>:"—"}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

            ))}
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-hd">
          <div className="card-title">Add Custom Fields</div>
          <span className="badge badge-blue">For your specific metrics</span>
        </div>
        <div className="card-bd">
          <p style={{fontSize:12.5,color:"var(--slate)",marginBottom:16,lineHeight:1.6}}>

                value={newField.unit} onChange={e=>setNF({...newField,unit:e.target.value})}/>

            <div>
              <label className="flabel">Category</label>
              <input className="finput" placeholder="Portfolio"

              <button className="btn btn-gold" disabled={!newField.key||!newField.label} onClick={add}>

          {customFields.length>0&&(
            <div>
              <div style={{fontSize:10,color:"var(--slate)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8,fontWeight:600}}>Custom Fields</div>

/* ─── CSV Export ──────────────────────────── */
function exportCSV(extractions){
  const rows=[["Company","Period","Document Type","Metric","Value","Unit","Confidence","Source"]];
  extractions.forEach(ext=>{
    HFC_FIELDS.forEach(f=>{
      const fd=ext.data?.fields?.[f.key];
      rows.push([
        ext.company||ext.data?.company_name||"",
        ext.period||ext.data?.period_detected||"",
        ext.docType||"",
        f.label,
        fd?.value??"",
        f.unit,
        fd?.conf||"not_found",
        (fd?.src||"").replace(/,/g," "),
      ]);
    });
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download="hfc_intelligence_export.csv";
  a.click();
}
